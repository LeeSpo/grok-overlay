name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            artifact_glob: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - name: windows-arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            bundles: nsis
            artifact_glob: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          - name: macos-x64
            runner: macos-13
            target: x86_64-apple-darwin
            bundles: dmg
            artifact_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            bundles: dmg
            artifact_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install JS Dependencies
        run: npm ci

      - name: Build Tauri Bundle
        run: npm run tauri:build -- --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: bundle-*
          merge-multiple: true

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**
